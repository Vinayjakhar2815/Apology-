<!DOCTYPE html>
<html>
<head>
<title>Sorry Yashika ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#ff9a9e,#fad0c4);font-family:Arial;overflow:hidden}
.card{background:white;width:90%;max-width:420px;padding:30px;border-radius:25px;text-align:center;box-shadow:0 15px 35px #0003;animation:pop 1.2s ease}
@keyframes pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
h1{color:#ff4d6d;font-size:42px}
p{color:#555;font-size:18px;line-height:1.6}
button{background:#ff4d6d;color:white;border:0;padding:15px 35px;border-radius:30px;font-size:17px;cursor:pointer}
.heart{position:absolute;top:-20px;font-size:25px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(360deg);opacity:0}}
</style>
</head>
<body>
<div class="card">
<h1>I'm Sorry ❤️</h1>
<p>Hey <b>Yashika</b> 🥹❤️<br><br>
I’m sorry for everything.<br><br>
I know I made a mistake, and I truly regret it.<br><br>
I promise I will understand you better and I will never repeat it again ❤️❤️<br><br>
Please forgive me 🥺💕</p>
<button onclick="forgive()">Click Here ❤️</button>
<p id="text"></p>
</div>
<script>
function forgive(){
document.getElementById("text").innerHTML="Thank you Yashika ❤️🥹 I promise to keep you happy.";
for(let i=0;i<40;i++){let h=document.createElement("div");h.className="heart";h.innerHTML="❤️";h.style.left=Math.random()*100+"%";h.style.animationDuration=(2+Math.random()*4)+"s";document.body.appendChild(h);setTimeout(()=>h.remove(),6000);}
}
</script>
</body>
</html>
